    <style>
        /* ... Entire Style Block from Step 225 ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; width: 100%; max-width: 100%; position: relative; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif; background: #000000; color: #ffffff; line-height: 1.6; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; width: 100%; }
        /* ... (The styles are mostly standard but the user tweaked the card grid) ... */
        .tc-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            margin-top: 50px; 
            position: relative;
            z-index: 2;
        }
        .tc-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 20px; 
            padding: 30px; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            position: relative; 
            overflow: visible;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 220px;
        }
        .tc-card:hover { 
            transform: translateY(-8px); 
            background: rgba(255, 255, 255, 0.04); 
            border-color: rgba(255, 255, 255, 0.15); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
        }
        /* ... (Mascot Styles) ... */
        .tc-mascote {
            position: absolute;
            bottom: -30px;
            right: -20px;
            width: 140px;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: mascotFloat 4s ease-in-out infinite;
        }
        @keyframes mascotFloat {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-10px) rotate(-1deg); }
        }
    </style>
</head>
